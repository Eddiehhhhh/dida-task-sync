name: "滴答任务同步到任务中心"

on:
  schedule:
    # 每天下午3:50执行 (UTC 7:50 = 北京时间15:50)
    # 比 dida2diary 早10分钟运行，确保时间一致
    - cron: "50 7 * * *"
    # 每天晚上11:20执行 (UTC 15:20 = 北京时间23:20)
    - cron: "20 15 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "目标日期 (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  sync-tasks:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests -q

      - name: Run sync script
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DIDA_TOKEN: ${{ secrets.DIDA_TOKEN }}
        run: |
          # 使用北京时间
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE=$(date +%Y-%m-%d)
          fi
          echo "同步日期: $TARGET_DATE (北京时间)"
          python3 dida2taskcenter_sync.py "$TARGET_DATE" run
