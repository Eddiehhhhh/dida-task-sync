name: Sync Xiaohongshu Links

on:
  # 每 5 分钟定时检查
  schedule:
    - cron: '*/5 * * * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新处理所有最近笔记（忽略已处理记录）'
        required: false
        default: 'false'
  # 外部服务触发（如 cron-job.org）
  repository_dispatch:
    types: [sync]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        run: node sync.js
        env:
          XINZHI_TOKEN: ${{ secrets.XINZHI_TOKEN }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}

      - name: Commit processed IDs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_ids.json
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "chore: 更新已处理记录 $(date +%Y-%m-%d\ %H:%M:%S)"
            # 允许 push 失败，不中断 workflow
            git push origin main || echo "Push 失败，继续执行"
          fi

      - name: Report status
        if: always()
        run: |
          echo "=========================================="
          echo "Workflow 执行完成: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行 ID: ${{ github.run_id }}"
          echo "=========================================="

