name: Sync Xiaohongshu Links

on:
  # 每 30 分钟定时检查（与 keep2notion 保持一致）
  schedule:
    - cron: "*/30 * * * *"
  # 手动触发
  workflow_dispatch:
  # 外部服务触发
  repository_dispatch:
    types: [sync]

# 防止并发运行，确保每次只运行一个实例
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        run: node sync.js
        env:
          XINZHI_TOKEN: ${{ secrets.XINZHI_TOKEN }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}

      - name: Commit processed IDs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_ids.json
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "chore: 更新已处理记录 $(date +%Y-%m-%d\ %H:%M:%S)"
            # 与 keep2notion 保持一致，允许 push 失败
            git push origin main || echo "nothing to push"
          fi

      - name: Report status
        if: always()
        run: |
          echo "=========================================="
          echo "Workflow 执行完成: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行 ID: ${{ github.run_id }}"
          echo "=========================================="

